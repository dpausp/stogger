[project]
name = "nicestlog"
version = "0.3.3"
description = "A sophisticated multi-target structured logging system built on structlog"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "structlog>=23.0.0",
    "eliot>=1.0.0",
    "requests>=2.32.4",
    "typer>=0.9.0",
    "rich>=13.0",
    "toml>=0.10.2",
    "click<8.2",
    "colorama>=0.4.6",
    "pexpect>=4.9.0",
    "pytest>=8.4.1",
]

[project.optional-dependencies]
color = ["colorama>=0.4.0"]
web = ["flask>=3.0.3"]

[project.scripts]
nicestlog = "nicestlog:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nicestlog"]

[tool.hatch.build.targets.wheel.force-include]
"README.md" = "nicestlog/_docs/README.md"
"docs" = "nicestlog/_docs"

[tool.hatch.build.targets.sdist]
include = ["README.md", "docs/**"]

[tool.pytest.ini_options]
testpaths = [
    "tests",
]
python_files = [
    "test_*.py",
    "*_test.py",
]
python_classes = [
    "Test*",
]
python_functions = [
    "test_*",
]
addopts = [
    "--tb=short",
    "--strict-markers",
    "--strict-config",
    "--disable-warnings",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks tests as integration tests",
]
filterwarnings = [
    "error",
    "ignore::UserWarning",
    "ignore::DeprecationWarning",
]

[tool.nicestlog]
# Source directory (default: "src")
src_dir = "src"
# Exclude non-library paths from linter/check by default
exclude = [
  "tests/**",
  "docs/**",
  "examples/**",
]

[tool.bandit]
exclude_dirs = [
    ".venv",
    "build/",
    "dist/",
    "tests",
]
# Skip these tests for acceptable low-severity issues
skips = [
    "B101",  # Use of assert (acceptable in tests)
    "B110",  # try_except_pass - acceptable for optional imports and error handling
    "B112",  # try_except_continue - acceptable for file processing loops
    "B106",  # hardcoded_password_funcarg - demo/test data only
    "B311",  # random - used for demo data generation, not security
    "B404",  # subprocess - needed for editor integration
    "B603",  # subprocess_without_shell_equals_true - safe usage with controlled input
]

[tool.uv.sources]
nicestlog = { workspace = true }

[dependency-groups]
dev = [
    "bandit>=1.8.6",
    "build>=1.3.0",
    "doit>=0.36.0",
    "hatch>=1.14.1",
    "mdformat>=0.7.22",
    "mypy>=1.14.1",
    "nicestlog[web]",
    "pre-commit>=3.5.0",
    "pylint>=3.3.8",
    "radon>=6.0.1",
    "tomli-w>=1.0.0",
    "types-colorama>=0.4.0",
    "types-toml>=0.10.8.20240310",
    "validate-pyproject>=0.24.1",
    "vulture>=2.14",
]
docs = [
    "sphinx>=7.0.0",
    "furo>=2024.1.29",
    "myst-parser>=2.0.0",
    "sphinx-copybutton>=0.5.2",
    "sphinx-autobuild>=2021.3.14",
    "sphinx-design>=0.5.0",
    "sphinxext-opengraph>=0.9.0",
    "sphinx-notfound-page>=1.0.0",
    "linkify-it-py>=2.0.3",
]
ipython = [
    "ipython>=9.4.0",
]
ruff = [
    "ruff>=0.12.7",
]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]

[tool.ruff]
line-length = 88
target-version = "py311"
extend-exclude = ["tests"]

[tool.ruff.lint]
select = [
    "E", "W", "F", "I", "N", "D", "UP", "YTT", "S", "BLE", "FBT", "B", 
    "A", "COM", "C4", "DTZ", "T10", "EM", "EXE", "FA", "ISC", "ICN", 
    "G", "INP", "PIE", "T20", "PYI", "PT", "Q", "RUF", "SLF", "SLOT", "SIM", 
    "TID", "TCH", "INT", "ARG", "PTH", "TD", "FIX", "ERA", "PGH", 
    "PL", "TRY", "NPY", "PERF", "FURB", "LOG"
]
ignore = [
    "D100", "D104", "D203", "D213",  # Docstring style preferences
    "S101",  # Use of assert (acceptable in tests)
    "T20",   # Print statements (we have structured logging)
]

[tool.ruff.lint.isort]
known-first-party = [
    "nicestlog",
]
force-sort-within-sections = true

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"


[tool.mypy]
python_version = "3.11"
files = [
    "src",
]
warn_return_any = true
warn_unused_configs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
warn_unreachable = true
strict_equality = true
strict = false
show_error_codes = true
show_column_numbers = true
pretty = true
ignore_missing_imports = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
disallow_untyped_decorators = false
exclude = [
    "build/",
    "dist/",
    ".venv/",
    "tests/",
]

[tool.pylint.main]
py-version = "3.11"
ignore-patterns = [".venv"]
fail-under = 9.8

[tool.pylint.messages_control]
disable = [ "all" ]
enable = [ "duplicate-code" ]

[tool.pylint.similarities]
min-similarity-lines = 5
ignore-comments = true
ignore-docstrings = true
ignore-imports = true

[tool.vulture]
exclude = [
    ".venv/",
    "build/",
    "dist/",
    "tests/",
]
min_confidence = 80
sort_by_size = true

[tool.radon]
exclude = "tests/*,build/*,dist/*,.venv/*"
total_average = true

[tool.coverage.run]
source = [
    "src",
]
branch = true
omit = [
    "tests/*",
    ".venv/*",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "if self.debug:",
    "if settings.DEBUG",
    "raise AssertionError",
    "raise NotImplementedError",
    "if 0:",
    "if __name__ == .__main__.:",
    "class .*\\bProtocol\\):",
    "@(abc\\.)?abstractmethod",
]
show_missing = true
skip_covered = false
precision = 2
