[dependency-groups]
lint = [
    "ruff>=0.15.0",
    "ty>=0.0.24",
    "vulture>=2.16",
]
test = [
    "pytest>=9.0.0",
    "pytest-cov>=6.0.0",
    "pytest-timeout>=2.4.0",
    "pexpect>=4.9.0",
]
docs = [
    "sphinx>=7.0.0",
    "furo>=2024.1.29",
    "myst-parser>=2.0.0",
    "sphinx-copybutton>=0.5.2",
    "sphinx-autobuild>=2021.3.14",
    "sphinx-design>=0.5.0",
    "sphinxext-opengraph>=0.9.0",
    "sphinx-notfound-page>=1.0.0",
    "linkify-it-py>=2.0.3",
    "sphinx-autoapi>=3.8.0",
    "sphinx-autodoc-typehints>=3.5.2",
    "sphinx-llms-txt>=0.7.1",
    "roman-numerals>=4.1.0",
]
dev = [
    {include-group = "lint"},
    {include-group = "test"},
    {include-group = "docs"},
    "build>=1.4.2",
    "hatch>=1.16.5",
    "mdformat>=0.7.22",
    "stoggertools",
    "pre-commit>=3.5.0",
    "radon>=6.0.1",
    "tomli-w>=1.0.0",
    "validate-pyproject>=0.24.1",
    "tox>=4.50.0",
    "tox-uv-bare>=1.33.1",
]
ipython = ["ipython>=9.4.0"]
cli = [
    "typer>=0.16.1",
]

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
stogger = { workspace = true }
stogger-systemd = { workspace = true }
stogger-eliot = { workspace = true }
stogger-web = { workspace = true }
stoggertools = { workspace = true }

[tool.ruff]
line-length = 120
target-version = "py313"
extend-exclude = [ "tests", "examples", "docs",]



[tool.vulture]
exclude = [ ".venv/", "build/", "dist/", "tests/",]
min_confidence = 80
sort_by_size = true

[tool.ty.src]
exclude = ["tests", "examples", "docs"]

[tool.radon]
exclude = "tests/*,build/*,dist/*,.venv/*"
total_average = true

[tool.pytest.ini_options]
testpaths = [ "tests",]
python_files = [ "test_*.py", "*_test.py",]
python_classes = [ "Test*",]
python_functions = [ "test_*",]
addopts = [ "--tb=short", "--strict-markers", "--strict-config", "--disable-warnings",]
markers = [ "slow: marks tests as slow (deselect with '-m \"not slow\"')", "integration: marks tests as integration tests", "docs: tests that require built documentation",]
filterwarnings = [ "error", "ignore::UserWarning", "ignore::DeprecationWarning",]

[tool.ruff.lint]
select = [ "E", "W", "F", "I", "N", "D", "UP", "YTT", "S", "BLE", "FBT", "B", "A", "COM", "C4", "DTZ", "T10", "DJ", "EM", "EXE", "FA", "ISC", "ICN", "G", "INP", "PIE", "T20", "PYI", "PT", "Q", "RUF", "SLF", "SLOT", "SIM", "TID", "TCH", "INT", "ARG", "PTH", "TD", "FIX", "ERA", "PD", "PGH", "PL", "TRY", "FLY", "NPY", "AIR", "PERF", "FURB", "LOG",]
ignore = [ "D100", "D104", "D203", "D213", "COM812", "A002", "ARG001", "D101", "D102", "D103", "D105", "D107", "D205", "D400", "D401", "D417", "E402", "FBT001", "FBT002", "FBT003", "LOG015", "N806", "PLC0415", "PLR0911", "PLR0912", "PLR0913", "PLR0915", "PLR2004", "PLW0603", "PLW2901", "SIM115", "SLF001", "TRY300", "BLE001", "S603", "S607",]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.coverage.run]
source = [ "packages",]
branch = true
omit = [ "tests/*", ".venv/*",]

[tool.coverage.report]
exclude_lines = [ "pragma: no cover", "def __repr__", "if self.debug:", "if settings.DEBUG", "raise AssertionError", "raise NotImplementedError", "if 0:", "if __name__ == .__main__.:", "class .*\\bProtocol\\):", "@(abc\\.)?abstractmethod",]
show_missing = true
skip_covered = false
precision = 2

[tool.tox]
env_list = ["fix", "cov", "docs", "build", "3.13"]
skip_missing_interpreters = true

[tool.tox.env_run_base]
package = "skip"
runner = "uv-venv-lock-runner"
dependency_groups = ["test"]
depends = ["fix"]
commands = [["pytest", { replace = "posargs", extend = true }]]

[tool.tox.env.fix]
skip_install = true
depends = []
description = "Format, lint, fix whitespace, type-check, dead code"
allowlist_external = ["ruff", "ty"]
dependency_groups = ["test", "lint"]
commands = [
    ["ruff", "check", "--fix"],
    ["ty", "check"],
    ["vulture", "packages/", "tests/", "--min-confidence=80"],
    ["ruff", "format"],
]

[tool.tox.env.cov]
base_python = ["3.13"]
package = "skip"
runner = "uv-venv-lock-runner"
dependency_groups = ["test"]
depends = ["fix"]
description = "Tests with coverage"
commands = [
    ["pytest", "--cov=stogger", "--cov=stogger_systemd", "--cov=stogger_eliot", "--cov=stogger_web", "--cov=stoggertools", "--cov-report=term-missing", "--cov-report=html"],
]

[tool.tox.env.docs]
skip_install = false
package = "editable"
runner = "uv-venv-lock-runner"
depends = ["fix"]
description = "Build Sphinx HTML documentation"
dependency_groups = ["test", "docs"]
allowlist_externals = ["rm"]
commands_pre = [
    ["rm", "-rf", "docs/autoapi", "docs/_build"],
]
commands = [
    ["pytest", "-m", "docs", "tests/test_docs_e2e.py"],
    ["sphinx-build", "-b", "html", "docs", "docs/_build/html"],
]

[tool.tox.env.build]
skip_install = true
depends = ["docs"]
description = "Build package with embedded documentation"
dependency_groups = ["docs"]
commands = [
    ["python", "scripts/build_docs_for_package.py"],
    ["uv", "build", { replace = "posargs", extend = true }],
]
