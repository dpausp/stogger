[project]
name = "nicestlog"
version = "0.1.6"
description = "A sophisticated multi-target structured logging system built on structlog"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "structlog>=23.0.0",
    "eliot>=1.0.0",
    "flask>=3.0.3",
    "requests>=2.32.4",
    "typer>=0.9.0",
    "rich>=13.0",
    "toml>=0.10.2",
    "click<8.2",
    "colorama>=0.4.6",
]

[project.optional-dependencies]
color = ["colorama>=0.4.0"]

[project.scripts]
nicestlog = "nicestlog:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/nicestlog"]

[tool.hatch.build.targets.wheel.force-include]
"README.md" = "nicestlog/_docs/README.md"
"docs" = "nicestlog/_docs"

[tool.hatch.build.targets.sdist]
include = ["README.md", "docs/**"]

[tool.nicestlog]
# Source directory (default: "src")
src_dir = "src"

[dependency-groups]
dev = [
    "hatch>=1.14.1",
    "mypy>=1.14.1",
    "pre-commit>=3.5.0",
    "ruff>=0.12.7",
    "types-colorama>=0.4.0",
]
ipython = [
    "ipython>=9.4.0",
]
test = [
    "pytest>=7.0.0",
    "pytest-cov>=4.0.0",
]
