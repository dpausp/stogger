[build-system]
requires = ["hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "stogger-eliot"
dynamic = ["version"]
requires-python = ">=3.13"
dependencies = ["structlog>=25.4.0", "stogger", "eliot>=1.17.5"]

[tool.hatch.version]
source = "vcs"
root = "../.."
fallback-version = "0.0.0"

[tool.hatch.build.targets.wheel]
packages = ["src/stogger_eliot"]
