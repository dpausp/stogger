[build-system]
requires = ["hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "pytest-stogger"
dynamic = ["version"]
requires-python = ">=3.13"
dependencies = []
description = "AST-based convention checking helpers for pytest."
classifiers = [
    "Framework :: Pytest",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.13",
]

[project.optional-dependencies]
complexipy = ["complexipy"]

[project.entry-points.pytest11]
stogger = "pytest_stogger.plugin"

[tool.hatch.version]
source = "vcs"
tag-pattern = "^(?P<version>\\d{4}\\.\\d{1,2}\\.\\d{1,2})$"
fallback-version = "0.0.0"
raw-options.root = "../.."

[tool.hatch.build.targets.wheel]
packages = ["src/pytest_stogger"]
